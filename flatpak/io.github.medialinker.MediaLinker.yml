id: io.github.medialinker.MediaLinker
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: media-linker
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --filesystem=host
  - --talk-name=org.freedesktop.portal.Desktop
modules:
  - name: media-linker
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib/medialinker
      - install -Dm755 MediaLinker /app/lib/medialinker/MediaLinker
      - cp -a _internal /app/lib/medialinker/_internal
      - test ! -f 使用说明.txt || install -Dm644 使用说明.txt /app/lib/medialinker/使用说明.txt
      - install -Dm755 medialinker-flatpak.sh /app/bin/media-linker
      - install -Dm644 io.github.medialinker.MediaLinker.desktop /app/share/applications/io.github.medialinker.MediaLinker.desktop
      - install -Dm644 io.github.medialinker.MediaLinker.metainfo.xml /app/share/metainfo/io.github.medialinker.MediaLinker.metainfo.xml
      - install -Dm644 io.github.medialinker.MediaLinker.svg /app/share/icons/hicolor/scalable/apps/io.github.medialinker.MediaLinker.svg
    sources:
      - type: dir
        path: ../dist/MediaLinker
      - type: file
        path: medialinker-flatpak.sh
      - type: file
        path: io.github.medialinker.MediaLinker.desktop
      - type: file
        path: io.github.medialinker.MediaLinker.metainfo.xml
      - type: file
        path: io.github.medialinker.MediaLinker.svg
