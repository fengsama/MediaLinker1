name: Build Windows

on:
  workflow_dispatch:
  push:
    branches: ['main']
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Build Windows application
        run: |
          python -m pip install -r backend/requirements.txt pyinstaller
          python -m PyInstaller --noconfirm --clean MediaLinker.spec
          New-Item -ItemType Directory -Path release -Force | Out-Null
          Compress-Archive -Path dist\MediaLinker -DestinationPath release\MediaLinker-Windows-x64.zip -Force
      - name: Build Windows installer
        run: |
          choco install innosetup --no-progress -y
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer\MediaLinker.iss
      - uses: actions/upload-artifact@v4
        with:
          name: MediaLinker-Windows-x64
          path: |
            release/MediaLinker-Setup-x64.exe
            release/MediaLinker-Windows-x64.zip
          if-no-files-found: error
