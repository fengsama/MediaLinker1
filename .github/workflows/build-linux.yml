name: Build Linux and Flatpak

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install system build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-venv python3-tk flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.freedesktop.Platform//25.08 org.freedesktop.Sdk//25.08
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build Linux portable package
        run: |
          chmod +x build-linux.sh build-flatpak.sh flatpak/medialinker-flatpak.sh
          ./build-linux.sh
      - name: Build Flatpak bundle
        run: ./build-flatpak.sh
      - uses: actions/upload-artifact@v4
        with:
          name: MediaLinker-Linux-x86_64
          path: |
            release/MediaLinker-Linux-x86_64.tar.gz
            release/MediaLinker-x86_64.flatpak
          if-no-files-found: error
